name: smartbridgeapp
description: Real-time sign language translator with speech and camera assist.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  camera: ^0.11.3
  hand_landmarker: ^2.2.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  permission_handler: ^11.4.0
  google_fonts: ^6.3.3
  shared_preferences: ^2.5.5
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - smartbridge.png
    - assets/models/
    - assets/sounds/
    - assets/tutorial/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: smartbridge.png
  adaptive_icon_foreground: smartbridge.png
  adaptive_icon_background: '#0F766E'
  web:
    generate: true
    image_path: smartbridge.png
    background_color: '#0F766E'
    theme_color: '#0F766E'
  windows:
    generate: true
    image_path: smartbridge.png
    icon_size: 256
  macos:
    generate: true
    image_path: smartbridge.png
